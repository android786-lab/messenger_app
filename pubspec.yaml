name: facebook_messanger
description: "Production Messenger clone — Flutter + Firebase + Supabase media."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^17.2.4

  # Supabase media
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1
  mime: ^2.0.0

  # State Management
  provider: ^6.1.2

  # Image / media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0

  # Audio
  flutter_sound: ^9.2.13
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1

  # UI
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1

  # Voice / video calls
  zego_uikit_prebuilt_call: ^4.16.18

  # Files
  file_picker: ^10.3.8

  # Local storage / security
  shared_preferences: ^2.2.2
  local_auth: ^3.0.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env